<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >

    <title>Cadastrar Produto</title>

    <link
      rel="stylesheet"
      href="../assets/css/create-product.css"
    >

</head>

<body>

    <main>

        <form id="product-form">

            <h1>Cadastrar Produto</h1>

            <input
              type="text"
              id="nome"
              placeholder="Nome do produto"
              required
            >

            <input
              type="number"
              id="preco"
              placeholder="Preço"
              required
            >

            <textarea
              id="descricao"
              placeholder="Descrição"
              required
            ></textarea>

            <input
              type="text"
              id="imagem"
              placeholder="URL da imagem"
              required
            >

            <button type="submit">
                Salvar Produto
            </button>

        </form>

    </main>

    <script
      type="module"
      src="./create-product.js"
    ></script>

</body>

</html>
