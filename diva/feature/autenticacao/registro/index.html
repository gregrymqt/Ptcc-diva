<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Registro</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="title">
      <h1>Criar Conta</h1>
      <p>Preencha os dados para se registrar</p>
    </div>

    <form>

      <div class="input-group">

        <label for="nome">Nome</label>

        <input type="text" id="nome" placeholder="Digite seu nome">

        <span class="error-message" id="nome-error"></span>

      </div>

      <div class="input-group">

        <label for="email">Email</label>

        <input type="email" id="email" placeholder="Digite seu email">

        <span class="error-message" id="email-error"></span>

      </div>

      <div class="input-group">

        <label for="senha">Senha</label>

        <input type="password" id="senha" placeholder="Crie uma senha">

        <span class="error-message" id="senha-error"></span>

      </div>

      <div class="input-group">

        <label for="confirmar">Confirmar senha</label>

        <input type="password" id="confirmar" placeholder="Confirme sua senha">

        <span class="error-message" id="confirmar-error"></span>

      </div>

      <button class="btn-register" type="submit">
        Criar Conta
      </button>

    </form>

    <div class="footer">
      Já possui conta?
      <a href="../login/index.html">Entrar</a>
    </div>

  </div>
  <script type="module" src="./registro.js"></script>
</body>

</html>
