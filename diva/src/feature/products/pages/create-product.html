<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo - Diva</title>
  <link rel="stylesheet" href="../styles/create-product.css">
  <link rel="stylesheet" href="../../../shared/components/navbar/navbar.css">
  <link rel="stylesheet" href="../../../shared/components/footer/footer.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>
  <!-- Navbar será injetada aqui -->
  <div id="navbar"></div>

  <main class="admin-main">
    <div class="admin-container">
      <h1 class="admin-title">Painel Administrativo</h1>
      
      <!-- Navegação de Abas -->
      <div class="admin-tabs">
        <button class="tab-btn active" data-target="tab-novo-produto">Novo Produto</button>
        <button class="tab-btn" data-target="tab-pedidos">Pedidos Recebidos</button>
      </div>

      <!-- Conteúdo das Abas -->
      <div class="tab-content active" id="tab-novo-produto">
        <div id="product-form-container"></div>
      </div>

      <div class="tab-content" id="tab-pedidos">
        <div id="admin-orders-container">
          <!-- Renderizado pelo AdminOrdersComponent -->
        </div>
      </div>
    </div>
  </main>

  <!-- Footer será injetado aqui -->
  <div id="footer"></div>
  
  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="../create-product.js"></script>
</body>
</html>
