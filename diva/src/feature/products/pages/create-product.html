<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo - Diva</title>
  <link rel="stylesheet" href="../../../style.css">
  <link rel="stylesheet" href="../styles/create-product.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>
  <!-- Navbar será injetada aqui -->
  <div id="navbar"></div>

  <main class="admin-main">
    <div class="admin-container">
      <h1 class="admin-title">Painel Administrativo</h1>
      
      <!-- Navegação de Abas -->
      <div class="admin-tabs">
        <button class="tab-btn active" data-target="tab-novo-produto">Novo Produto</button>
        <button class="tab-btn" data-target="tab-pedidos">Pedidos Recebidos</button>
      </div>

      <!-- Conteúdo das Abas -->
      <div class="tab-content active" id="tab-novo-produto">
        <form id="product-form" class="admin-form">
          <h2>Cadastrar Produto</h2>
          <input type="text" id="nome" placeholder="Nome do produto" required>
          <input type="number" id="preco" placeholder="Preço" required>
          <textarea id="descricao" placeholder="Descrição" required></textarea>
          <div class="form-group" style="margin-bottom: 1rem;">
            <label for="product-image-input" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Imagem do Produto (Max 300KB)</label>
            <input type="file" id="product-image-input" accept="image/*" required style="width: 100%;">
            <img id="product-image-preview" src="" style="display: none; max-width: 150px; border-radius: 8px; margin-top: 1rem; border: 1px solid #ddd;">
          </div>
          <div class="form-group custom-select-group">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Categoria</label>
            <div class="custom-dropdown" id="custom-category-dropdown">
              <div class="dropdown-header" id="category-dropdown-header">Selecione uma categoria ▼</div>
              <div class="dropdown-list" id="category-dropdown-list">
                <!-- Radios renderizados via JS -->
              </div>
            </div>
          </div>
          <button type="submit" class="btn-admin-submit">Salvar Produto</button>
        </form>
      </div>

      <div class="tab-content" id="tab-pedidos">
        <div id="admin-orders-container">
          <!-- Renderizado pelo AdminOrdersComponent -->
        </div>
      </div>
    </div>
  </main>

  <!-- Footer será injetado aqui -->
  <div id="footer"></div>
  
  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="./create-product.js"></script>
</body>
</html>
